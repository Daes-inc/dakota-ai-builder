<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dakota AI Builder</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

input {
  padding: 15px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 25px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

#preview {
  margin-top: 20px;
  background: #020617;
  padding: 20px;
  min-height: 200px;
  border-radius: 10px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">
  <h1>Dakota AI Builder</h1>

  <input id="prompt" placeholder="Enter your idea" />
  <br>
  <button onclick="build()">Build</button>

  <div id="preview">Ready...</div>
</div>

<script>
async function build() {
  const prompt = document.getElementById("prompt").value;
  const preview = document.getElementById("preview");

  preview.innerHTML = "LOADING...";

  try {
    const res = await fetch("/build", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const text = await res.text();

    preview.innerHTML =
      "STATUS: " + res.status + "\n\n" +
      "RAW RESPONSE:\n" + text;

  } catch (err) {
    preview.innerHTML = "FRONTEND ERROR:\n" + err.message;
  }
}
</script>

</body>
</html>
