<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dakota AI Builder Master System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

h1 {
  font-size: 48px;
  margin-bottom: 10px;
}

.sub {
  color: #cbd5e1;
  margin-bottom: 20px;
}

.panel {
  background: #111c34;
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 18px;
}

input, select {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin-bottom: 12px;
  font-size: 16px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

button {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.secondary {
  background: #334155;
}

#output {
  margin-top: 20px;
  background: #020617;
  padding: 18px;
  min-height: 140px;
  border-radius: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  text-align: left;
}

iframe {
  width: 100%;
  height: 700px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  background: white;
  margin-top: 20px;
}

#savedProjects {
  text-align: left;
}

.saved-item {
  background: rgba(255,255,255,0.04);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

.live-link {
  color: #86efac;
  word-break: break-all;
  font-weight: bold;
}

@media (max-width: 700px) {
  .row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
<div class="container">
  <h1>Dakota AI Builder</h1>
  <div class="sub">Master system mode</div>

  <div class="panel">
    <input id="prompt" value="fitness affiliate landing page" placeholder="Describe your site" />

    <div class="row">
      <select id="template">
        <option value="premium">Premium</option>
        <option value="bold">Bold</option>
        <option value="minimal">Minimal</option>
      </select>

      <input id="affiliateLink" placeholder="Optional affiliate link" />
    </div>

    <div class="actions">
      <button id="buildBtn">Build</button>
      <button id="downloadBtn" class="secondary">Download ZIP</button>
      <button id="deployBtn">Deploy Live</button>
      <button id="saveBtn" class="secondary">Save Project</button>
      <button id="analyticsBtn" class="secondary">Analytics</button>
      <button id="projectsBtn" class="secondary">Saved Projects</button>
    </div>
  </div>

  <div class="panel">
    <div id="output">Ready...</div>
    <div id="liveWrap"></div>
  </div>

  <div class="panel">
    <iframe id="preview"></iframe>
  </div>

  <div class="panel">
    <h3>Saved Projects</h3>
    <div id="savedProjects">No saved projects loaded yet.</div>
  </div>
</div>

<script>
let generatedProject = null;

document.getElementById("buildBtn").addEventListener("click", build);
document.getElementById("downloadBtn").addEventListener("click", downloadZip);
document.getElementById("deployBtn").addEventListener("click", deployLive);
document.getElementById("saveBtn").addEventListener("click", saveProject);
document.getElementById("analyticsBtn").addEventListener("click", loadAnalytics);
document.getElementById("projectsBtn").addEventListener("click", loadProjects);

async function build() {
  const prompt = document.getElementById("prompt").value || "AI Website";
  const template = document.getElementById("template").value;
  const affiliateLink = document.getElementById("affiliateLink").value;
  const output = document.getElementById("output");

  output.textContent = "Building...";
  document.getElementById("liveWrap").innerHTML = "";

  try {
    const res = await fetch("/build", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        prompt,
        template,
        affiliateLink
      })
    });

    const data = await res.json();
    generatedProject = data;

    if (!data.success) {
      output.textContent = JSON.stringify(data, null, 2);
      return;
    }

    output.textContent = JSON.stringify({
      success: data.success,
      prompt: data.prompt,
      projectName: data.projectName,
      niche: data.niche,
      template: data.template
    }, null, 2);

    document.getElementById("preview").srcdoc = data.previewHtml;
  } catch (err) {
    output.textContent = "ERROR: " + err.message;
  }
}

async function downloadZip() {
  const output = document.getElementById("output");

  if (!generatedProject || !generatedProject.files) {
    output.textContent = "Build a project first.";
    return;
  }

  try {
    const res = await fetch("/download", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(generatedProject)
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = (generatedProject.projectName || "site") + ".zip";
    a.click();

    URL.revokeObjectURL(url);
    output.textContent = "ZIP download started.";
  } catch (err) {
    output.textContent = "ERROR: " + err.message;
  }
}

async function deployLive() {
  const output = document.getElementById("output");

  if (!generatedProject || !generatedProject.files) {
    output.textContent = "Build a project first.";
    return;
  }

  output.textContent = "Deploying...";

  try {
    const res = await fetch("/deploy", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(generatedProject)
    });

    const data = await res.json();

    output.textContent = JSON.stringify(data, null, 2);

    if (data.url) {
      document.getElementById("liveWrap").innerHTML =
        '<p><a class="live-link" href="' + data.url + '" target="_blank">' + data.url + "</a></p>";
    }
  } catch (err) {
    output.textContent = "ERROR: " + err.message;
  }
}

async function saveProject() {
  const output = document.getElementById("output");

  if (!generatedProject || !generatedProject.projectName) {
    output.textContent = "Build a project first.";
    return;
  }

  try {
    const res = await fetch("/save-project", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(generatedProject)
    });

    const data = await res.json();
    output.textContent = JSON.stringify(data, null, 2);
    loadProjects();
  } catch (err) {
    output.textContent = "ERROR: " + err.message;
  }
}

async function loadAnalytics() {
  const output = document.getElementById("output");

  try {
    const res = await fetch("/analytics");
    const data = await res.json();
    output.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    output.textContent = "ERROR: " + err.message;
  }
}

async function loadProjects() {
  try {
    const res = await fetch("/projects");
    const data = await res.json();
    const wrap = document.getElementById("savedProjects");

    if (!data.items || !data.items.length) {
      wrap.innerHTML = "No saved projects yet.";
      return;
    }

    wrap.innerHTML = data.items.map(item => {
      return '<div class="saved-item"><strong>' + item.projectName + '</strong><br>' +
        'Template: ' + item.template + '<br>' +
        'Niche: ' + item.niche + '<br>' +
        'Created: ' + item.createdAt + '</div>';
    }).join("");
  } catch (err) {
    document.getElementById("savedProjects").textContent = "ERROR: " + err.message;
  }
}
</script>
</body>
</html>
