<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dakota AI Builder v101</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

.container {
  padding: 30px;
}

input {
  padding: 15px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 25px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

#preview {
  margin-top: 20px;
  background: #020617;
  padding: 20px;
  min-height: 200px;
  border-radius: 10px;
}

.version {
  color: #86efac;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Dakota AI Builder</h1>
  <div class="version">VERSION 101</div>

  <input id="prompt" placeholder="Enter your idea" />
  <br>

  <button id="buildBtn">Build</button>

  <div id="preview">Ready...</div>
</div>

<script>
document.getElementById("buildBtn").addEventListener("click", async function () {

  const prompt = document.getElementById("prompt").value || "test page";
  const preview = document.getElementById("preview");

  preview.innerHTML = "LOADING...";

  try {
    const res = await fetch("/build", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt: prompt })
    });

    const data = await res.json();

    preview.innerHTML = `
      <div style="border:1px solid #1e293b; border-radius:10px; overflow:hidden;">
        <div style="background:#020617; padding:10px; font-size:12px;">
          STATUS: ${res.status}
        </div>
        <div style="background:white; color:black; padding:15px;">
          ${data.previewHtml}
        </div>
      </div>
    `;

  } catch (err) {
    preview.innerHTML = "ERROR: " + err.message;
  }

});
</script>

</body>
</html>
