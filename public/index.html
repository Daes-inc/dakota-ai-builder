<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dakota AI Builder</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

input {
  padding: 15px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 25px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 16px;
}

#preview {
  margin-top: 20px;
  background: #020617;
  padding: 20px;
  min-height: 200px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Dakota AI Builder</h1>

  <input id="prompt" placeholder="Enter your idea" />
  <br>
  <button onclick="build()">Build</button>

  <div id="preview">Ready...</div>
</div>

<script>
async function build() {
  const prompt = document.getElementById("prompt").value;
  const preview = document.getElementById("preview");

  preview.innerHTML = "LOADING...";

  try {
    const res = await fetch("/build", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();

    // FORCE DISPLAY
    preview.innerHTML = `
      <div style="padding:10px;">
        <h2>SUCCESS</h2>
        <p><strong>Prompt:</strong> ${data.prompt}</p>
        <div>${data.previewHtml}</div>
      </div>
    `;

  } catch (err) {
    preview.innerHTML = "ERROR: " + err.message;
  }
}
</script>

</body>
</html>
