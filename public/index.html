<!DOCTYPE html>
<html>
<head>
  <title>Dakota AI Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }
    input {
      padding: 10px;
      width: 80%;
      border-radius: 8px;
      border: none;
    }
    button {
      padding: 12px;
      margin: 8px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }
    #output {
      margin-top: 20px;
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>🚀 Dakota AI Builder</h1>

<input id="prompt" placeholder="Describe your website..." />

<br>

<button onclick="build()">Build</button>
<button onclick="deploy()">Deploy Live</button>

<div id="output">Ready...</div>

<script>
async function build() {
  document.getElementById("output").innerText = "Building...";
  const prompt = document.getElementById("prompt").value;

  const res = await fetch('/build', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  window.generatedProject = data;
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

async function deploy() {
  document.getElementById("output").innerText = "Deploying...";

  const res = await fetch('/deploy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(window.generatedProject)
  });

  const data = await res.json();

  if (data.url) {
    document.getElementById("output").innerHTML =
      `✅ LIVE:<br><a href="${data.url}" target="_blank">${data.url}</a>`;
  } else {
    document.getElementById("output").innerText = JSON.stringify(data);
  }
}
</script>

</body>
</html>
