<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dakota AI Builder v103</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

input {
  padding: 15px;
  width: 80%;
  border-radius: 10px;
  border: none;
}

button {
  padding: 15px 25px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
}

#preview {
  margin-top: 20px;
  background: #020617;
  padding: 20px;
  min-height: 200px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Dakota AI Builder</h1>
  <div>VERSION 103</div>

  <input id="prompt" placeholder="Enter your idea" />
  <br>
  <button id="btn">Build</button>

  <div id="preview">Ready...</div>
</div>

<script>
document.getElementById("btn").onclick = async function () {

  const preview = document.getElementById("preview");

  preview.innerHTML = "CLICK WORKED";

  try {
    const res = await fetch("https://dakota-ai-builder-production.up.railway.app/build", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        prompt: document.getElementById("prompt").value || "test page"
      })
    });

    preview.innerHTML = "REQUEST SENT";

    const data = await res.json();

    preview.innerHTML = `
      <div style="background:white; color:black; padding:15px; border-radius:10px;">
        ${data.previewHtml}
      </div>
    `;

  } catch (err) {
    preview.innerHTML = "ERROR: " + err.message;
  }

};
</script>

</body>
</html>
