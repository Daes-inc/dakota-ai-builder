<!DOCTYPE html>
<html lang="en">
<head>
  <title>Dakota AI Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 52px;
      margin: 20px 0 10px;
    }

    .sub {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 22px;
    }

    .panel {
      background: #111c34;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      margin-bottom: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .secondary {
      background: #334155;
    }

    .danger {
      background: #8b5cf6;
    }

    pre {
      background: #020617;
      color: #e2e8f0;
      padding: 14px;
      border-radius: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 160px;
    }

    iframe {
      width: 100%;
      height: 650px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      background: white;
    }

    .live-link {
      display: inline-block;
      color: #86efac;
      font-weight: 700;
      margin-top: 10px;
      word-break: break-all;
    }

    .small {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 8px;
    }

    .saved-list {
      display: grid;
      gap: 10px;
    }

    .saved-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
    }

    @media (max-width: 700px) {
      .row {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dakota AI Builder</h1>
    <div class="sub">Premium builder mode · templates · deploy · save · analytics</div>

    <div class="panel">
      <input id="prompt" value="fitness affiliate landing page" placeholder="Describe your website" />

      <div class="row">
        <select id="template">
          <option value="premium">Premium</option>
          <option value="minimal">Minimal</option>
          <option value="bold">Bold</option>
        </select>

        <input id="affiliateLink" placeholder="Optional affiliate link" />
      </div>

      <div class="actions">
        <button onclick="build()">Build</button>
        <button class="secondary" onclick="downloadSite()">Download ZIP</button>
        <button onclick="deploy()">Deploy Live</button>
        <button class="secondary" onclick="saveProject()">Save Project</button>
        <button class="danger" onclick="loadAnalytics()">Analytics</button>
        <button class="secondary" onclick="loadProjects()">Saved Projects</button>
      </div>

      <div id="liveWrap"></div>
      <div class="small">Free limit: 3 builds per IP before upgrade prompt.</div>
    </div>

    <div class="panel">
      <pre id="output">Ready...</pre>
    </div>

    <div class="panel">
      <iframe id="preview"></iframe>
    </div>

    <div class="panel">
      <h3 style="margin-top:0;">Saved Projects</h3>
      <div id="savedProjects" class="saved-list">No saved projects loaded yet.</div>
    </div>
  </div>

  <script>
    let generatedProject = null;

    async function build() {
      document.getElementById("output").innerText = "Building...";
      document.getElementById("liveWrap").innerHTML = "";

      const prompt = document.getElementById("prompt").value;
      const template = document.getElementById("template").value;
      const affiliateLink = document.getElementById("affiliateLink").value;

      const res = await fetch("/build", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, template, affiliateLink })
      });

      const data = await res.json();
      generatedProject = data;

      if (data.error) {
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
        return;
      }

      document.getElementById("output").innerText = JSON.stringify({
        projectName: data.projectName,
        template: data.template,
        niche: data.niche,
        pages: data.pages
      }, null, 2);

      if (data.previewHtml) {
        document.getElementById("preview").srcdoc = data.previewHtml;
      }
    }

    async function deploy() {
      if (!generatedProject) {
        document.getElementById("output").innerText = "Build a project first.";
        return;
      }

      document.getElementById("output").innerText = "Deploying...";

      const res = await fetch("/deploy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(generatedProject)
      });

      const data = await res.json();

      if (data.url) {
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
        document.getElementById("liveWrap").innerHTML =
          '<a class="live-link" href="' + data.url + '" target="_blank">' + data.url + "</a>";
      } else {
        document.getElementById("output").innerText = JSON.stringify(data, null, 2);
      }
    }

    async function downloadSite() {
      if (!generatedProject) {
        document.getElementById("output").innerText = "Build a project first.";
        return;
      }

      const res = await fetch("/download", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(generatedProject)
      });

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = (generatedProject.projectName || "site") + ".zip";
      a.click();
      URL.revokeObjectURL(url);
    }

    async function saveProject() {
      if (!generatedProject) {
        document.getElementById("output").innerText = "Build a project first.";
        return;
      }

      const res = await fetch("/save-project", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(generatedProject)
      });

      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data, null, 2);
      loadProjects();
    }

    async function loadAnalytics() {
      const res = await fetch("/analytics");
      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    }

    async function loadProjects() {
      const res = await fetch("/projects");
      const data = await res.json();

      const wrap = document.getElementById("savedProjects");

      if (!data.items || !data.items.length) {
        wrap.innerHTML = "No saved projects yet.";
        return;
      }

      wrap.innerHTML = data.items.map(item => {
        return '<div class="saved-item"><strong>' + item.projectName + '</strong><br>' +
          'Template: ' + item.template + '<br>' +
          'Niche: ' + item.niche + '<br>' +
          'Created: ' + item.createdAt + '</div>';
      }).join("");
    }
  </script>
</body>
</html>
