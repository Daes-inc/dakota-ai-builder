<!DOCTYPE html>
<html>
<head>
  <title>GenesisAI</title>
  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:50px;
    }

    input {
      padding:15px;
      width:300px;
      border-radius:10px;
      border:none;
      margin:10px;
    }

    button {
      padding:15px 30px;
      background:#22c55e;
      border:none;
      border-radius:10px;
      color:white;
      font-size:16px;
    }
  </style>
</head>

<body>
  <h1>GenesisAI</h1>
  <p>Build. Launch. Profit.</p>

  <form method="POST" action="/build">
    <input name="idea" placeholder="Enter your idea" required><br>
    <input name="affiliate" placeholder="Affiliate link (optional)"><br>
    <button type="submit">Build Page</button>
  </form>
</body>
</html>
